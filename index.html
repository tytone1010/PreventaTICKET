<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Preventa</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="ticket">

<h2>BODEGA EL CARACOL</h2>
<h3>PEDIDO PREVENTA</h3>

<hr>

<p>ID: <span id="id"></span></p>
<p>Fecha: <span id="fecha"></span></p>
<p>Cliente: <span id="cliente"></span></p>

<table>

<thead>
<tr>
<th>Cant</th>
<th>Unidad</th>
<th>Vend</th>
<th>PUnit</th>
<th>Sub</th>
</tr>
</thead>

<tbody id="productos">
</tbody>

</table>

<hr>

<div class="totales">

<p>Subtotal <span id="subtotal"></span></p>
<p>ISV <span id="isv"></span></p>

<hr>

<p class="total">TOTAL <span id="total"></span></p>

</div>

<p class="gracias">*** Gracias por su compra ***</p>

</div>

<script src="script.js"></script>

</body>
</html>
